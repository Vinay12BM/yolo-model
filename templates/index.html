<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Guardian | Cloud Brain</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --accent: #22c55e; --alert: #ef4444; --text: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        header { width: 100%; padding: 1.5rem 0; background: linear-gradient(135deg, #1e293b, #0f172a); text-align: center; border-bottom: 1px solid #334155; }
        .container { width: 90%; max-width: 600px; padding: 2rem 0; text-align: center; }
        
        #video-container { position: relative; width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid #334155; background: #000; aspect-ratio: 4/3; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }

        .status-panel { margin-top: 1.5rem; padding: 1rem; background: var(--card-bg); border-radius: 12px; border: 1px solid #334155; }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .scanning { color: #94a3b8; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; }

        #detection-alert { display: none; margin-top: 1.5rem; padding: 1rem; background: rgba(239, 68, 68, 0.2); border: 2px solid var(--alert); border-radius: 12px; color: var(--alert); font-weight: 700; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
    </style>
</head>
<body>

<header>
    <h1>Agri-Guardian Cloud Brain</h1>
</header>

<div class="container">
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="snapshot"></canvas>
    </div>

    <div id="detection-alert">
        ⚠️ ANIMAL DETECTED: <span id="detected-class">---</span>
    </div>

    <div class="status-panel">
        <div id="status-text" class="scanning">
            <span class="indicator" id="status-indicator"></span> 
            SYSTEM INITIALIZING...
        </div>
        <button id="start-btn">ENABLE CLOUD CAMERA</button>
    </div>

    <p style="color: #64748b; font-size: 0.8rem; margin-top: 2rem;">
        This device is now the <b>Camera Source</b>. <br>
        Run <code>main.py</code> on your laptop to receive the alarm.
    </p>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('snapshot');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');
    const alertDiv = document.getElementById('detection-alert');
    const alertClass = document.getElementById('detected-class');
    
    let isProcessing = false;

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = stream;
            statusText.innerText = "CLOULD MONITORING ACTIVE";
            statusIndicator.classList.add('active');
            startBtn.style.display = 'none';
            
            // Start detection loop
            setInterval(captureAndProcess, 1500); // Check every 1.5 seconds
        } catch (err) {
            console.error("Camera access denied", err);
            statusText.innerText = "ERROR: CAMERA ACCESS DENIED";
        }
    }

    async function captureAndProcess() {
        if (isProcessing) return;
        isProcessing = true;

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL('image/jpeg', 0.6); // Compress to 60% quality to save bandwidth

        try {
            const response = await fetch('/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const result = await response.json();

            if (result.found) {
                alertDiv.style.display = 'block';
                alertClass.innerText = result.class.toUpperCase();
                setTimeout(() => { alertDiv.style.display = 'none'; }, 3000);
            }
        } catch (err) {
            console.error("Detection sync failed", err);
        }

        isProcessing = false;
    }

    startBtn.addEventListener('click', setupCamera);
</script>

</body>
</html>
